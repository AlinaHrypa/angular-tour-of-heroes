<h2>{{heroWind.name | uppercase}} Details</h2>
<!-- {{}} - interpolation binding syntax-->
<!--Built-in papes: uppercase, Date, Number, decimal, percent, Currency, Json, slice-->

<div>
  <span>id: </span>
  {{heroWind.id}}
</div>

<div>
  <label for="name">Hero name: </label>
  <input id="name" [(ngModel)]="heroWind.name" placeholder="name"> <!-- [()] - Two-Way Data Binding,-->
</div>

<h2>My Heroes</h2>
<ul class="heroes">
  <li  *ngFor="let hero of heroes"> <!-- The *ngFor is Angular's repeater directive.-->
    <button type="button"
            [class.selected]="hero === selectedHero"
            (click)="onSelect(hero)">
      <span class="badge">{{hero.id}}</span>
      <span class="name">{{hero.name}}</span>
    </button>
  </li>
</ul>

<div *ngIf="selectedHero">
  <h2>{{selectedHero.name | uppercase}} Details</h2>
  <div>id: {{selectedHero.id}}</div>
  <div>
    <label for="hero-name">Hero name: </label>
    <input id="hero-name" [(ngModel)]="selectedHero.name" placeholder="name">
  </div>
</div>
