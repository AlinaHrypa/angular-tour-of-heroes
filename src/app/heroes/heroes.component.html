<h2>My Heroes</h2>

<ul class="heroes">
  <li  *ngFor="let hero of heroes">
    <!--[class.mySelected]="hero === selectedHero"  Присвоює кнопцій клас:   .heroes button.mySelected  -->
    <button type="button"
            [class.mySelected]="hero === selectedHero"
            (click)="onSelect(hero)">
      <span class="id">{{hero.id}}</span>
      <span class="name">{{hero.name}}</span>
    </button>
  </li>
</ul>

<!--  hero = HeroDetailComponent,   selectedHero = HeroesComponent  -->
<app-hero-detail *ngIf="selectedHero" [hero]="selectedHero"></app-hero-detail>
